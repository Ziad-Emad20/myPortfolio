<body>
  <div id="navbar-container"></div>

  <section class="contact-section" id="contact">
    <div class="container">
      <div class="contact-wrapper">

        <div class="contact-header">
          <h2 data-i18n="contact.title"></h2>
          <p data-i18n="contact.subtitle"></p>
        </div>

        <div class="contact-card">
          <div class="contact-grid">

            <form
              class="contact-form"
              action="https://formspree.io/f/maqaynzl"
              method="POST"
              novalidate
            >
              <div class="form-group">
                <label for="contact-name" data-i18n="contact.form.name"></label>
                <input
                  id="contact-name"
                  name="name"
                  type="text"
                  minlength="3"
                  autocomplete="name"
                  data-i18n-placeholder="contact.form.placeholders.name"
                  required
                >
              </div>

              <div class="form-group">
                <label for="contact-phone" data-i18n="contact.form.phone"></label>
                <input
                  id="contact-phone"
                  name="phone"
                  type="tel"
                  dir="ltr"
                  inputmode="tel"
                  autocomplete="tel"
                  data-i18n-placeholder="contact.form.placeholders.phone"
                >
              </div>

              <div class="form-group">
                <label for="contact-email" data-i18n="contact.form.email"></label>
                <input
                  id="contact-email"
                  name="email"
                  type="email"
                  autocomplete="email"
                  data-i18n-placeholder="contact.form.placeholders.email"
                  required
                >
              </div>

              <div class="form-group">
                <label for="contact-message" data-i18n="contact.form.message"></label>
                <textarea
                  id="contact-message"
                  name="message"
                  minlength="10"
                  data-i18n-placeholder="contact.form.placeholders.message"
                  required
                ></textarea>
              </div>

              <input type="hidden" name="_subject" value="New Portfolio Contact Message">

              <button type="submit" class="send-btn" data-i18n="contact.form.send"></button>

              <div class="form-message" id="formMessage" data-i18n="contact.form.success"></div>
            </form>

            <aside class="contact-side-card">
              <div class="contact-side-inner">

                <span class="side-badge" data-i18n="contact.side.badge"></span>

                <h2 class="side-title" data-i18n="contact.side.title"></h2>

                <p class="side-text" data-i18n="contact.side.text"></p>

                <a
                  class="whatsapp-cta"
                  href="https://wa.me/2011225699265?text=%D9%85%D8%B1%D8%AD%D8%A8%D9%8B%D8%A7%20%D8%B2%D9%8A%D8%A7%D8%AF%D8%8C%0A%D8%A3%D8%B1%D9%8A%D8%AF%20%D8%A7%D9%84%D8%AA%D9%88%D8%A7%D8%B5%D9%84%20%D9%85%D8%B9%D9%83%20%D8%A8%D8%AE%D8%B5%D9%88%D8%B5%20%D9%85%D8%B4%D8%B1%D9%88%D8%B9%D9%8A.%0A%0A%D9%86%D9%88%D8%B9%20%D8%A7%D9%84%D8%AE%D8%AF%D9%85%D8%A9%3A%20%5BShopify%20Store%20%2F%20Website%20%2F%20Frontend%20%2F%20Content%5D%0A%D8%A7%D8%B3%D9%85%20%D8%A7%D9%84%D8%A8%D8%B1%D8%A7%D9%86%D8%AF%20%D8%A3%D9%88%20%D8%A7%D9%84%D9%85%D8%B4%D8%B1%D9%88%D8%B9%3A%20%5B%20%20%20%5D%0A%D8%A7%D9%84%D9%85%D8%B7%D9%84%D9%88%D8%A8%20%D8%A8%D8%A7%D8%AE%D8%AA%D8%B5%D8%A7%D8%B1%3A%20%5B%20%20%20%5D%0A%D8%A7%D9%84%D9%85%D9%88%D8%B9%D8%AF%20%D8%A7%D9%84%D9%85%D8%AA%D9%88%D9%82%D8%B9%3A%20%5B%20%20%20%5D%0A%0AHello%20Ziad%2C%0AI%E2%80%99d%20like%20to%20contact%20you%20regarding%20my%20project.%0A%0AService%3A%20%5BShopify%20Store%20%2F%20Website%20%2F%20Frontend%20%2F%20Content%5D%0ABrand%20or%20project%20name%3A%20%5B%20%20%20%5D%0ABrief%20about%20what%20I%20need%3A%20%5B%20%20%20%5D%0AExpected%20timeline%3A%20%5B%20%20%20%5D"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <span class="whatsapp-cta-icon">
                    <i class="fa-brands fa-whatsapp"></i>
                  </span>

                  <span class="whatsapp-cta-content">
                    <strong data-i18n="contact.side.ctaTitle"></strong>
                    <small data-i18n="contact.side.ctaSub"></small>
                  </span>

                  <span class="whatsapp-cta-arrow">
                    <i class="fa-solid fa-arrow-right"></i>
                  </span>
                </a>

                <div class="contact-mini-points" id="contactPoints"></div>

              </div>
            </aside>

          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="/js/home-animations.js" defer></script>
  <script src="/js/main.js"></script>

</html>
