  <!--  Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!--  Libraries -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

  <!--  CSS -->
  <link rel="stylesheet" href="/css/base/variables.css">
  <link rel="stylesheet" href="/css/base/global.css">

  <link rel="stylesheet" href="/css/layout/header.css">
  <link rel="stylesheet" href="/css/layout/footer.css">

  <link rel="stylesheet" href="/css/components/buttons.css">
  <link rel="stylesheet" href="/css/pages/contact.css">
</head>

<body>
  <div id="navbar-container"></div>

  <section class="contact-section" id="contact">
    <div class="container">
      <div class="contact-wrapper">

        <div class="contact-header">
          <h2 data-i18n="contact.title"></h2>
          <p data-i18n="contact.subtitle"></p>
        </div>

        <div class="contact-card">
          <div class="contact-grid">

            <form
              class="contact-form"
              action="https://formspree.io/f/maqaynzl"
              method="POST"
              novalidate
            >

              <!-- Hidden Subject -->
              <input type="hidden" name="_subject" value="New Portfolio Contact Message">
              <input type="hidden" name="_captcha" value="false">

              <div class="form-group">
                <label for="contact-name" data-i18n="contact.form.name"></label>
                <input
                  id="contact-name"
                  name="name"
                  type="text"
                  minlength="3"
                  autocomplete="name"
                  data-i18n-placeholder="contact.form.placeholders.name"
                  required
                >
              </div>

              <div class="form-group">
                <label for="contact-phone" data-i18n="contact.form.phone"></label>
                <input
                  id="contact-phone"
                  name="phone"
                  type="tel"
                  dir="ltr"
                  inputmode="tel"
                  autocomplete="tel"
                  data-i18n-placeholder="contact.form.placeholders.phone"
                >
              </div>

              <div class="form-group">
                <label for="contact-email" data-i18n="contact.form.email"></label>
                <input
                  id="contact-email"
                  name="email"
                  type="email"
                  autocomplete="email"
                  data-i18n-placeholder="contact.form.placeholders.email"
                  required
                >
              </div>

              <div class="form-group">
                <label for="contact-message" data-i18n="contact.form.message"></label>
                <textarea
                  id="contact-message"
                  name="message"
                  minlength="10"
                  data-i18n-placeholder="contact.form.placeholders.message"
                  required
                ></textarea>
              </div>

              <button type="submit" class="send-btn" data-i18n="contact.form.send"></button>

              <div class="form-message" id="formMessage" data-i18n="contact.form.success"></div>
            </form>

            <aside class="contact-side-card">
              <div class="contact-side-inner">

                <span class="side-badge" data-i18n="contact.side.badge"></span>

                <h2 class="side-title" data-i18n="contact.side.title"></h2>

                <p class="side-text" data-i18n="contact.side.text"></p>

                <a
                  class="whatsapp-cta"
                  href="https://wa.me/2011225699265"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <span class="whatsapp-cta-icon">
                    <i class="fa-brands fa-whatsapp"></i>
                  </span>

                  <span class="whatsapp-cta-content">
                    <strong data-i18n="contact.side.ctaTitle"></strong>
                    <small data-i18n="contact.side.ctaSub"></small>
                  </span>

                  <span class="whatsapp-cta-arrow">
                    <i class="fa-solid fa-arrow-right"></i>
                  </span>
                </a>

                <div class="contact-mini-points" id="contactPoints"></div>

              </div>
            </aside>

          </div>
        </div>
      </div>
    </div>
  </section>

  <footer id="footer-container"></footer>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="/js/i18n/translations.js" defer></script>
  <script src="/js/i18n/i18n.js" defer></script>
  <script src="/js/components/contact.js" defer></script>
  <script src="/js/components/navbar.js" defer></script>
  <script src="/js/components/footer.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>
  <script src="/js/home-animations.js" defer></script>
  <script src="/js/main.js"></script>
</body>

</html>
