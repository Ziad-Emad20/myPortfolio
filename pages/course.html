<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopify Course | Ziad Emad</title>

  <meta
    name="description"
    content="Learn how to build, launch, and manage a Shopify store from scratch with a practical no-code course."
  />

  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <link rel="stylesheet" href="/css/base/variables.css" />
  <link rel="stylesheet" href="/css/base/global.css" />

  <link rel="stylesheet" href="/css/layout/header.css" />
  <link rel="stylesheet" href="/css/layout/footer.css" />

  <link rel="stylesheet" href="/css/components/buttons.css" />

  <link rel="stylesheet" href="/css/pages/course.css" />
</head>
<body>
  <div id="navbar-container"></div>

  <main class="course-page">
    <section class="course-hero" id="course-hero">
      <div class="container">
        <div id="course-hero-container"></div>
      </div>
    </section>

    <section class="course-highlights" id="course-highlights">
      <div class="container">
        <div id="course-highlights-container"></div>
      </div>
    </section>

    <section class="course-fit" id="course-fit">
      <div class="container">
        <div id="course-fit-container"></div>
      </div>
    </section>

    <section class="course-achievements" id="course-achievements">
      <div class="container">
        <div id="course-achievements-container"></div>
      </div>
    </section>

    <section class="course-content" id="course-content">
      <div class="container">
        <div id="course-content-container"></div>
      </div>
    </section>

    <section class="course-difference" id="course-difference">
      <div class="container">
        <div id="course-difference-container"></div>
      </div>
    </section>

    <section class="course-audience" id="course-audience">
      <div class="container">
        <div id="course-audience-container"></div>
      </div>
    </section>

    <section class="course-instructor" id="course-instructor">
      <div class="container">
        <div id="course-instructor-container"></div>
      </div>
    </section>

    <section class="course-proof" id="course-proof">
      <div class="container">
        <div id="course-proof-container"></div>
      </div>
    </section>

    <section class="course-faq" id="course-faq">
      <div class="container">
        <div id="course-faq-container"></div>
      </div>
    </section>

    <section class="course-cta" id="course-cta">
      <div class="container">
        <div id="course-cta-container"></div>
      </div>
    </section>

    <footer id="footer-container"></footer>
  </main>

  <script src="/js/components/navbar.js"></script>
  <script src="/js/components/footer.js" defer></script>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>

  <script src="/js/course-page.js" defer></script>
